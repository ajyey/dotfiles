[ids]
*

[main]
# Command drives the macOS compatibility layer. Tapping it has no side effect.
leftmeta = layer(meta_mac)
rightmeta = layer(meta_mac)

# Option remains Alt while enabling macOS-style word navigation below.
leftalt = layer(alt)
rightalt = layer(alt)

# Map Capslock to a Hyper key (Ctrl+Alt+Shift+Super) when held, and Escape when tapped!
capslock = overload(hyper, esc)

[alt]
# Emulate macOS word navigation. Linux natively uses Alt+Left/Right for "Browser Back/Forward".
# By overriding Option+Left/Right to explicitly send Ctrl+Left/Right, we force Linux 
# to skip words in text boxes instead of jumping between web pages!
left = C-left
right = C-right
# Delete word backward/forward
backspace = C-backspace
delete = C-delete

# Reserve Option+Tab for cycling within a Niri column.
tab = A-`

[alt+shift]
left = C-S-left
right = C-S-right
tab = A-S-`

# The 'meta_mac' modifier layer; inherits from the 'Ctrl' modifier layer
[meta_mac:C]

# Copy (Universal Linux X11 copy)
c = C-insert
# Paste (Universal Linux X11 paste)
v = S-insert
# Cut
x = S-delete

# Move cursor to the beginning of the line
left = macro(home)
# Move cursor to the end of the line
right = macro(end)
# Delete to beginning/end of line (Universal Linux Readline shortcuts)
backspace = C-u
delete = C-k

# Browser Back/Forward (macOS style CMD+[ and CMD+])
# Since we hijacked the native Linux Alt+Left shortcut for word navigation above,
# we restore browser history navigation by mapping it to the native macOS Safari/Chrome shortcuts!
[ = A-left
] = A-right

# Move cursor to top/bottom of file
up = C-home
down = C-end

# Spotlight-style launcher. Niri consumes this Hyper chord.
space = C-M-S-A-space

# As soon as 'tab' is pressed (but not yet released), switch to the 'app_switch_state' overlay
# Send Alt+Tab for Niri's previously-focused-window action.
tab = swapm(app_switch_state, A-tab)

# Meta-Backtick: Switch to the next window in the application group (Alt+`)
grave = A-grave

[meta_mac+shift]
# Select to beginning/end
left = macro(S-home)
right = macro(S-end)

# Tab Reordering (macOS style CMD+Shift+[ and CMD+Shift+])
# Explicitly map these to Ctrl+Shift+[ and Ctrl+Shift+] so WezTerm can reorder tabs.
# If we don't, keyd applies Shift to the A-left mapping above, sending Alt+Shift+Left instead!
[ = C-S-[
] = C-S-]

# Select to top/bottom of file
up = C-S-home
down = C-S-end

# macOS screenshot shortcuts consumed by Niri.
3 = C-print
4 = print

# Preserve reverse app switching.
tab = A-S-tab

# Keep Alt held until Command is released so Noctalia commits the selection.
[app_switch_state:A]

# Continue switching without releasing Alt. Noctalia accepts Alt+Tab as tab_next.
tab = A-tab
right = A-tab

# Reverse without releasing Alt. Niri leaves this chord for Noctalia to handle.
grave = A-S-tab
left = A-S-tab

# ====================================================================
# Hyper Key Layer
# ====================================================================
# C-M-S-A = Ctrl + Meta(Super) + Shift + Alt
[hyper:C-M-S-A]

# Tab overlaps Niri's Alt+Tab family, so emit a dedicated compositor key.
tab = f20

# Niri binds this otherwise uncommon layer to compositor and shell actions.
