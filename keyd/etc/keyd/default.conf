[ids]
*

[main]
# Use the 'leftmeta' key as the new "Cmd" key, activating the 'meta_mac' layer when held.
# Send Alt+F1 (A-f1) when tapped to natively pop open the bottom-left application launcher in KDE!
leftmeta = overload(meta_mac, A-f1)
rightmeta = overload(meta_mac, A-f1)

# Map the physical Option (Alt) key to act as Alt when held.
# When tapped, send Alt+F1 (A-f1), which is the hardcoded KDE Plasma 
# shortcut for the bottom-left application launcher!
leftalt = overload(alt, A-f1)
rightalt = overload(alt, A-f1)

# Map Capslock to a Hyper key (Ctrl+Alt+Shift+Super) when held, and Escape when tapped!
capslock = overload(hyper, esc)

[alt]
# Emulate macOS word navigation. Linux natively uses Alt+Left/Right for "Browser Back/Forward".
# By overriding Option+Left/Right to explicitly send Ctrl+Left/Right, we force Linux 
# to skip words in text boxes instead of jumping between web pages!
left = C-left
right = C-right
shift+left = C-S-left
shift+right = C-S-right

# The 'meta_mac' modifier layer; inherits from the 'Ctrl' modifier layer
[meta_mac:C]

# Switch directly to open tabs (e.g., Firefox, VS Code, WezTerm)
1 = A-1
2 = A-2
3 = A-3
4 = A-4
5 = A-5
6 = A-6
7 = A-7
8 = A-8
9 = A-9

# Copy (Universal Linux X11 copy)
c = C-insert
# Paste (Universal Linux X11 paste)
v = S-insert
# Cut
x = S-delete

# Move cursor to the beginning of the line
left = home
# Move cursor to the end of the line
right = end
# Select to beginning/end
shift+left = S-home
shift+right = S-end

# Browser Back/Forward (macOS style CMD+[ and CMD+])
# Since we hijacked the native Linux Alt+Left shortcut for word navigation above,
# we restore browser history navigation by mapping it to the native macOS Safari/Chrome shortcuts!
[ = A-left
] = A-right
# Move cursor to top/bottom of file
up = C-home
down = C-end
shift+up = C-S-home
shift+down = C-S-end

# As soon as 'tab' is pressed (but not yet released), switch to the 'app_switch_state' overlay
# Send an 'A-tab' key tap before entering 'app_switch_state' (Alt+Tab for KDE/CachyOS)
tab = swapm(app_switch_state, A-tab)

# Meta-Backtick: Switch to the next window in the application group (Alt+`)
` = A-`

# 'app_switch_state' modifier layer; inherits from the 'Alt' (A) modifier layer
[app_switch_state:A]

# Alt-Tab: Switch to the next application
tab = A-tab
right = A-tab

# Alt-Shift-Tab: Switch to the previous application
` = A-S-tab
left = A-S-tab

# ====================================================================
# Hyper Key Layer
# ====================================================================
# C-M-S-A = Ctrl + Meta(Super) + Shift + Alt
[hyper:C-M-S-A]

# Launch Alfred-like app runner (KRunner / rofi / wofi usually binds to Alt+Space)
space = A-space
