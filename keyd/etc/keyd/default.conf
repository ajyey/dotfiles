[ids]

*

[main]
# Map Mac CMD (Super/Windows key) to a custom 'cmd' layer
leftmeta = layer(cmd)
rightmeta = layer(cmd)

# The 'cmd' layer inherits from 'Control' (C). 
# This means any key pressed while holding CMD will act like holding Ctrl,
# unless explicitly overridden below.
[cmd:C]

# Standard Mac shortcuts (Translates Cmd+Key to Ctrl+Key)
c = C-c
v = C-v
x = C-x
z = C-z
a = C-a
s = C-s
f = C-f
w = C-w
t = C-t
q = C-q
n = C-n
r = C-r
p = C-p
d = C-d

# Mac-like text navigation
left = home
right = end
shift+left = S-home
shift+right = S-end
up = C-home
down = C-end
shift+up = C-S-home
shift+down = C-S-end


# =====================================================================
# Application Overrides
# =====================================================================

# WezTerm already handles 'CMD' bindings natively via our wezterm.lua config.
# If we let keyd translate CMD to Ctrl, WezTerm will get confused. 
# So, we tell keyd to just pass the native Super key directly to WezTerm.
[wezterm]
leftmeta = leftmeta
rightmeta = rightmeta
