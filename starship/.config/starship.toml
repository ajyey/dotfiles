"$schema" = 'https://starship.rs/config-schema.json'

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$cmd_duration\
$fill\
$nodejs\
$python\
$golang\
$rust\
$docker_context\
$time\
$line_break\
$character"""

palette = 'rose-pine-moon'

[palettes.rose-pine-moon]
color_blue = '#9ccfd8'
color_cyan = '#ea9a97'
color_green = '#3e8fb0'
color_magenta = '#c4a7e7'
color_red = '#eb6f92'
color_yellow = '#f6c177'
color_muted = '#6e6a86'
color_fg = '#e0def4'

[directory]
style = "bold fg:color_blue"
truncation_length = 8
truncate_to_repo = false

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "
"Development" = "󰲋 "

[character]
success_symbol = "[❯](bold fg:color_magenta)"
error_symbol = "[❯](bold fg:color_red)"
vimcmd_symbol = "[❮](bold fg:color_green)"
vimcmd_replace_one_symbol = "[❯](bold fg:color_magenta)"
vimcmd_replace_symbol = "[❯](bold fg:color_magenta)"
vimcmd_visual_symbol = "[❯](bold fg:color_yellow)"

[git_branch]
symbol = ""
format = "[$symbol $branch]($style) "
style = "bold fg:color_magenta"

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = "bold fg:color_yellow"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇡${ahead_count}⇣${behind_count}"
conflicted = "=${count}"
modified = "!${count}"
staged = "+${count}"
untracked = "?${count}"
renamed = "»${count}"
deleted = "✘${count}"
stashed = ""

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "fg:color_muted"

[cmd_duration]
format = "[$duration]($style) "
style = "fg:color_yellow"

[fill]
symbol = ' '

[time]
disabled = false
time_format = "%I:%M %p"
style = "fg:color_muted"
format = '[ | $time]($style)'


[nodejs]
symbol = ""
style = "fg:color_green"
format = '[$symbol $version]($style)'


[python]
symbol = ""
style = "fg:color_yellow"
format = '[$symbol $version( \($virtualenv\))]($style) '
detect_files = []
